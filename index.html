<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180,220,180,0.18);
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 2s;
  }
  #back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    color: rgba(255,255,255,0.30);
    font-size: 10px;
    letter-spacing: 0.3em;
    font-family: Georgia, serif;
    text-decoration: none;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<a id="back" href="https://yoshiharumatsumoto-newtral.github.io/">← back</a>
<canvas id="c"></canvas>
<div id="hint">— touch —</div>
<script>
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('portrait').catch(()=>{});
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DPR = window.devicePixelRatio || 1;
let W = window.innerWidth;
let H = window.innerHeight;

function resizeCanvas() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); init(); });

// ── Pointers ──────────────────────────────────────────────
const mouse = { x:W*0.5, y:H*0.5, vx:0, vy:0, active:false };
const touches = [];
let isTouching = false;
let touchStartTime = 0;
let lastTouchTime = -9999;
const FREE_DELAY = 2000;
function getPointers() { return touches.length > 0 ? touches : [mouse]; }

const hint = document.getElementById('hint');

// ── Mic ────────────────────────────────────────────────────
let micLevel = 0, micRaw = 0, micReady = false;
async function initMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    const ac2 = new AudioContext();
    const src = ac2.createMediaStreamSource(stream);
    const an = ac2.createAnalyser(); an.fftSize = 256;
    src.connect(an);
    const buf = new Uint8Array(an.frequencyBinCount);
    micReady = true;
    function tick() {
      an.getByteTimeDomainData(buf);
      let sum = 0;
      for (let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;sum+=v*v;}
      micRaw = Math.sqrt(sum/buf.length);
      micLevel += (micRaw*6.0 - micLevel)*0.25;
      micLevel = Math.min(Math.max(micLevel,0),1);
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) { console.warn('Mic not available',e); }
}
initMic();

// ── Audio ──────────────────────────────────────────────────
let sharedAC = null, masterGain = null, delayNode = null, delayFeedback = null, delayWet = null;
const activeNodes = {};

function getAC() {
  if (!sharedAC) {
    sharedAC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = sharedAC.createGain();
    masterGain.gain.value = 0.35;

    // ── Shared delay (炭酸感) ──
    delayNode = sharedAC.createDelay(1.0);
    delayNode.delayTime.value = 0.12; // 120ms

    delayFeedback = sharedAC.createGain();
    delayFeedback.gain.value = 0.40; // フィードバック量

    delayWet = sharedAC.createGain();
    delayWet.gain.value = 0.50; // ウェット量

    // delay loop: delay → feedback → delay
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);

    // delay output → master
    delayNode.connect(delayWet);
    delayWet.connect(masterGain);

    masterGain.connect(sharedAC.destination);
  }
  return sharedAC;
}

// 高音域に絞ったヨナ抜き — C6・E6・F6周辺
// 指1本: C6付近、2本: E6付近、3本: F6付近、4本+: 混合
const SCALE_HIGH = [
  1046.50, // C6
  1174.66, // D6
  1318.51, // E6
  1396.91, // F6
  1567.98, // G6
  1760.00, // A6
  1975.53, // B6
  2093.00, // C7
];

function getFreq(x, fingerCount) {
  // 指の本数でスケールのゾーンをシフト
  const offset = Math.min(fingerCount - 1, 3) * 2;
  const zone = Math.min(Math.floor((x / W) * 4) + offset, SCALE_HIGH.length - 1);
  return SCALE_HIGH[zone];
}

function satCurve() {
  const curve = new Float32Array(512);
  for (let i=0;i<512;i++){const x=(i*2)/512-1;curve[i]=x*1.15/(1+0.15*Math.abs(x));}
  return curve;
}

function noteOn(id, x, y, fingerCount) {
  if (activeNodes[id]) return;
  const ac = getAC(); ac.resume();
  const now = ac.currentTime;
  const freq = getFreq(x, fingerCount || 1);
  const f = freq;

  const osc1 = ac.createOscillator();
  osc1.type = 'sawtooth'; osc1.frequency.value = f; osc1.detune.value = -18;
  const osc2 = ac.createOscillator();
  osc2.type = 'sawtooth'; osc2.frequency.value = f; osc2.detune.value = +18;
  const osc3 = ac.createOscillator();
  osc3.type = 'sine'; osc3.frequency.value = f*0.5;
  const subGain = ac.createGain(); subGain.gain.value = 0.30;
  const osc4 = ac.createOscillator();
  osc4.type = 'sine'; osc4.frequency.value = f*2;
  const harmGain = ac.createGain(); harmGain.gain.value = 0.12;

  // ピッチLFO（コーラス感）
  const lfo = ac.createOscillator();
  const lfoGain = ac.createGain();
  lfo.type = 'sine'; lfo.frequency.value = 5.40;
  lfoGain.gain.value = 9.5;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.detune);
  lfoGain.connect(osc2.detune);
  lfo.start();

  // フィルターLFO（炭酸のシュワシュワ感）
  const filterLfo = ac.createOscillator();
  const filterLfoGain = ac.createGain();
  filterLfo.type = 'sine';
  filterLfo.frequency.value = 2.8; // ゆっくり開閉
  filterLfoGain.gain.value = 180;  // cutoffを±180hz揺らす
  filterLfo.connect(filterLfoGain);
  filterLfo.start();

  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 530;
  filter.Q.value = 0.53;
  filterLfoGain.connect(filter.frequency); // フィルターLFO接続

  const hiCut = ac.createBiquadFilter();
  hiCut.type = 'lowpass'; hiCut.frequency.value = 500;

  const sat = ac.createWaveShaper();
  sat.curve = satCurve();

  const ampEnv = ac.createGain();
  ampEnv.gain.setValueAtTime(0, now);
  ampEnv.gain.linearRampToValueAtTime(0.7, now + 0.532);
  ampEnv.gain.linearRampToValueAtTime(0.280, now + 0.712);

  osc1.connect(filter); osc2.connect(filter);
  osc3.connect(subGain); subGain.connect(filter);
  osc4.connect(harmGain); harmGain.connect(filter);
  filter.connect(hiCut); hiCut.connect(sat); sat.connect(ampEnv);

  // dry → master、wet → delay → master
  const dryGain = ac.createGain(); dryGain.gain.value = 0.65;
  const sendGain = ac.createGain(); sendGain.gain.value = 0.35;
  ampEnv.connect(dryGain); dryGain.connect(masterGain);
  ampEnv.connect(sendGain); sendGain.connect(delayNode);

  [osc1,osc2,osc3,osc4].forEach(o => o.start());
  activeNodes[id] = { osc1, osc2, osc3, osc4, lfo, filterLfo, ampEnv };
}

function noteUpdate(id, x, y, fingerCount) {
  const n = activeNodes[id]; if (!n) return;
  const ac = getAC();
  const freq = getFreq(x, fingerCount || 1);
  n.osc1.frequency.setTargetAtTime(freq, ac.currentTime, 0.1);
  n.osc2.frequency.setTargetAtTime(freq, ac.currentTime, 0.1);
  n.osc3.frequency.setTargetAtTime(freq*0.5, ac.currentTime, 0.1);
  n.osc4.frequency.setTargetAtTime(freq*2, ac.currentTime, 0.1);
}

function noteOff(id) {
  const n = activeNodes[id]; if (!n) return;
  const ac = getAC();
  n.ampEnv.gain.setTargetAtTime(0, ac.currentTime, 0.669);
  setTimeout(() => {
    try { [n.osc1,n.osc2,n.osc3,n.osc4,n.lfo,n.filterLfo].forEach(o => o.stop()); } catch(e){}
    delete activeNodes[id];
  }, 2730);
}

// ── Touch events ───────────────────────────────────────────
window.addEventListener('mousemove', e => {
  mouse.vx = e.clientX-mouse.x; mouse.vy = e.clientY-mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
  hint.style.opacity = '0';
});
window.addEventListener('touchstart', e => {
  if (e.target.id === 'back') return;
  e.preventDefault();
  isTouching = true;
  touchStartTime = performance.now();
  for (const t of e.changedTouches) {
    touches.push({ x:t.clientX, y:t.clientY, vx:0, vy:0, id:t.identifier });
    noteOn(t.identifier, t.clientX, t.clientY, e.touches.length);
  }
  hint.style.opacity = '0';
}, { passive:false });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = touches.find(p => p.id === t.identifier);
    if (p) {
      p.vx = t.clientX-p.x; p.vy = t.clientY-p.y;
      p.x = t.clientX; p.y = t.clientY;
      noteUpdate(t.identifier, t.clientX, t.clientY, e.touches.length);
    }
    if (e.touches[0].identifier === t.identifier) {
      mouse.vx = t.clientX-mouse.x; mouse.vy = t.clientY-mouse.y;
      mouse.x = t.clientX; mouse.y = t.clientY;
    }
  }
}, { passive:false });
window.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    const i = touches.findIndex(p => p.id === t.identifier);
    if (i !== -1) touches.splice(i,1);
    noteOff(t.identifier);
  }
  if (touches.length === 0) {
    isTouching = false;
    lastTouchTime = performance.now();
    wander.angle = Math.random()*Math.PI*2;
    wander.turnPhase = Math.random()*Math.PI*2;
    for (const th of threads) {
      for (const nd of th.nodes) {
        nd.vx += (Math.random()-0.5)*6;
        nd.vy += (Math.random()-0.5)*6;
      }
    }
  }
}, { passive:false });

// ── Colour palette ─────────────────────────────────────────
const PALETTE = [
  [195,55,72],[168,45,76],[210,38,68],[180,30,63],[152,48,78],[220,42,65],
];

// ── Thread ─────────────────────────────────────────────────
class Thread {
  constructor(staggerOffset) {
    this.born = performance.now() - (staggerOffset||0);
    this._init();
  }
  _init() {
    const zone = Math.random();
    if (zone < 0.25) {
      const side = Math.floor(Math.random()*4);
      this.ox = side===0?Math.random()*W:side===1?W:side===2?Math.random()*W:0;
      this.oy = side===0?0:side===1?Math.random()*H:side===2?H:Math.random()*H;
    } else {
      this.ox = W*(0.08+Math.random()*0.84);
      this.oy = H*(0.08+Math.random()*0.84);
    }
    const count = 5+Math.floor(Math.random()*6);
    this.nodes = []; this.rest = [];
    for (let i=0;i<=count;i++) {
      const x = W*0.5+(Math.random()-0.5)*15;
      const y = H*0.5+(Math.random()-0.5)*15;
      this.nodes.push({x,y,vx:0,vy:0});
      this.rest.push({x:W*0.25+Math.random()*W*0.5, y:H*0.25+Math.random()*H*0.5});
    }
    const col = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    this.hue = col[0]+(Math.random()-0.5)*18;
    this.sat = col[1]+(Math.random()-0.5)*12;
    this.lit = col[2]+(Math.random()-0.5)*10;
    this.maxAlpha = 0.12+Math.random()*0.52;
    this.width    = 0.3+Math.random()*1.0;
    this.phase    = Math.random()*Math.PI*2;
    this.noiseSpd = 0.0003+Math.random()*0.0007;
    this.isAttractor = Math.random() < 0.1;
    this.attractR   = 150+Math.random()*230;
    this.attractStr = 0.007+Math.random()*0.016;
    this.damping    = 0.96+Math.random()*0.03;
    this.restore    = 0.0003+Math.random()*0.0008;
    this.lifespan = 60000+Math.random()*60000;
    this.fadeIn   = 1000+Math.random()*1500;
    this.fadeOut  = 1500+Math.random()*2500;
    this.linkedTo = null;
    this.linkStr  = 0.0006+Math.random()*0.001;
    this.alpha    = 0;
  }
  lifeAlpha(now) {
    const age=now-this.born, left=this.lifespan-age;
    if (age<this.fadeIn)  return Math.pow(age/this.fadeIn,1.5);
    if (left<this.fadeOut) return Math.max(0,Math.pow(left/this.fadeOut,1.2));
    return 1;
  }
  isDead(now) { return (now-this.born)>this.lifespan; }
  update(time, now, all) {
    const la = this.lifeAlpha(now);
    this.alpha = this.maxAlpha*la;
    if (!this.linkedTo && Math.random()<0.0008 && all.length>1) {
      this.linkedTo = all[Math.floor(Math.random()*all.length)];
      if (this.linkedTo===this) this.linkedTo=null;
    }
    if (this.linkedTo && this.linkedTo.isDead(now)) this.linkedTo=null;
    const sinceRelease = performance.now()-lastTouchTime;
    const useWander = !isTouching && !mouse.active && sinceRelease>FREE_DELAY;
    const ptrs = isTouching||mouse.active ? getPointers() : [];
    for (let i=0;i<this.nodes.length;i++) {
      const nd=this.nodes[i], rs=this.rest[i];
      const dnx=Math.sin(time*this.noiseSpd*1.4+i*1.9+this.phase)*0.45;
      const dny=Math.cos(time*this.noiseSpd*1.1+i*2.3+this.phase+1)*0.45;
      const rx=(rs.x-nd.x)*this.restore;
      const ry=(rs.y-nd.y)*this.restore;
      let ax=0,ay=0;
      if (useWander) {
        const dx=wander.x-nd.x, dy=wander.y-nd.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if (d<this.attractR) {
          const f=Math.pow(1-d/this.attractR,2)*this.attractStr*3.0;
          ax+=dx*f; ay+=dy*f;
        }
      }
      for (const ptr of ptrs) {
        const dx=ptr.x-nd.x, dy=ptr.y-nd.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if (d<this.attractR) {
          const f=Math.pow(1-d/this.attractR,2)*this.attractStr*8.0;
          ax+=dx*f+ptr.vx*f*0.22; ay+=dy*f+ptr.vy*f*0.22;
        }
      }
      if (this.linkedTo) {
        const ot=this.linkedTo.nodes[Math.min(i,this.linkedTo.nodes.length-1)];
        const lx=ot.x-nd.x, ly=ot.y-nd.y;
        const ld=Math.sqrt(lx*lx+ly*ly);
        if (ld>0&&ld<280) { ax+=lx*this.linkStr; ay+=ly*this.linkStr; }
      }
      if (micLevel>0.01) {
        const shake=micLevel*12.0;
        ax+=(Math.random()-0.5)*shake; ay+=(Math.random()-0.5)*shake;
      }
      nd.vx=(nd.vx+dnx+rx+ax)*this.damping;
      nd.vy=(nd.vy+dny+ry+ay)*this.damping;
      nd.x+=nd.vx; nd.y+=nd.vy;
    }
  }
  draw(time) {
    if (this.nodes.length<2||this.alpha<0.004) return;
    const touchDur = isTouching?Math.max(0,performance.now()-touchStartTime):0;
    const glowBoost = 1+Math.min(0.2,Math.max(0,(touchDur-2000)/2000)*0.2);
    const pulse = (0.78+0.22*Math.sin(time*0.0007+this.phase))*(1+micLevel*2.5)*glowBoost;
    const cyanTint   = touches.length===3?1:0;
    const yellowTint = touches.length===2?1:0;
    const pinkTint   = touches.length>=4 ?1:0;
    const a = this.alpha*pulse;
    const pts = this._samplePoints(50);
    for (let i=0;i<pts.length;i++) {
      const p=pts[i];
      const t=i/(pts.length-1);
      const env=Math.sin(t*Math.PI);
      const r=this.width*(0.69+0.92*env);
      ctx.save();
      ctx.globalAlpha=a*0.14*env*glowBoost;
      ctx.fillStyle=`hsla(${this.hue},${this.sat}%,80%,1)`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,r*3.5*Math.max(1,glowBoost*0.8),0,Math.PI*2);
      ctx.fill(); ctx.restore();
      ctx.save();
      ctx.globalAlpha=a*0.92;
      const cr=Math.floor(255-cyanTint*60+pinkTint*0);
      const cg=Math.floor(255-cyanTint*10-yellowTint*0-pinkTint*80);
      const cb=Math.floor(255-yellowTint*80-pinkTint*80);
      ctx.fillStyle=`rgba(${cr},${cg},${cb},1)`;
      ctx.beginPath();
      ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fill(); ctx.restore();
    }
  }
  _samplePoints(n) {
    const nodes=this.nodes, pts=[];
    for (let s=0;s<n;s++) {
      const t=s/(n-1);
      const segs=nodes.length-1;
      const si=Math.min(Math.floor(t*segs),segs-1);
      const st=(t*segs)-si;
      const p0=nodes[Math.max(si-1,0)];
      const p1=nodes[si];
      const p2=nodes[Math.min(si+1,nodes.length-1)];
      const p3=nodes[Math.min(si+2,nodes.length-1)];
      const t2=st*st,t3=st*st*st;
      const x=0.5*((2*p1.x)+(-p0.x+p2.x)*st+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
      const y=0.5*((2*p1.y)+(-p0.y+p2.y)*st+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
      pts.push({x,y});
    }
    return pts;
  }
}

// ── Wander ─────────────────────────────────────────────────
const wander = {
  x:W*0.5, y:H*0.5, vx:0, vy:0,
  angle:Math.random()*Math.PI*2,
  speed:0.5, timer:-99999, active:true,
  turnPhase:Math.random()*1000,
};
function updateWander(now) {
  wander.active = true;
  if (isTouching) {
    const ptrs=getPointers();
    if (ptrs.length>0) { wander.x=ptrs[0].x; wander.y=ptrs[0].y; }
  }
  if (!wander.active) return;
  wander.turnPhase += 0.003;
  wander.angle += Math.sin(wander.turnPhase*0.31)*0.018
                + Math.sin(wander.turnPhase*0.17)*0.013
                + Math.sin(wander.turnPhase*0.53)*0.009
                + Math.sin(wander.turnPhase*0.11)*0.006;
  wander.x += Math.cos(wander.angle)*wander.speed;
  wander.y += Math.sin(wander.angle)*wander.speed;
  const margin=120;
  if (wander.x<margin)   { wander.x=margin;   wander.angle=Math.PI-wander.angle; }
  if (wander.x>W-margin) { wander.x=W-margin; wander.angle=Math.PI-wander.angle; }
  if (wander.y<margin)   { wander.y=margin;   wander.angle=-wander.angle; }
  if (wander.y>H-margin) { wander.y=H-margin; wander.angle=-wander.angle; }
}

// ── Init ───────────────────────────────────────────────────
let threads = [];
function init() {
  threads = [];
  for (let i=0;i<145;i++) {
    const t = new Thread();
    t.born = performance.now()-Math.random()*t.lifespan*0.85;
    threads.push(t);
  }
}
init();

// ── Draw ───────────────────────────────────────────────────
function drawBG() {
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(W*0.5,H*0.4,0,W*0.5,H*0.5,Math.max(W,H)*0.7);
  g.addColorStop(0,'rgba(3,10,6,0.95)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function drawCursor(time) {
  const ptrs=touches.length>0?touches:(mouse.active?[mouse]:[]);
  const pulse=0.4+0.6*Math.sin(time*0.002);
  for (const ptr of ptrs) {
    ctx.save(); ctx.globalAlpha=0.08*pulse;
    ctx.strokeStyle='rgba(160,230,160,1)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.arc(ptr.x,ptr.y,18,0,Math.PI*2); ctx.stroke(); ctx.restore();
    ctx.save(); ctx.globalAlpha=0.25*pulse;
    ctx.fillStyle='rgba(180,255,160,1)';
    ctx.beginPath(); ctx.arc(ptr.x,ptr.y,1.2,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}
function drawMicIndicator() {
  if (!micReady) return;
  const x=28, y=H-28;
  ctx.save(); ctx.globalAlpha=0.15+micLevel*0.5;
  ctx.strokeStyle='rgba(200,255,180,1)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.arc(x,y,8+micLevel*14,0,Math.PI*2); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.globalAlpha=0.3+micLevel*0.6;
  ctx.fillStyle='rgba(200,255,180,1)';
  ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawVignette() {
  const vg=ctx.createRadialGradient(W*0.5,H*0.5,H*0.12,W*0.5,H*0.5,H*0.88);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(0.65,'rgba(0,0,0,0.25)');
  vg.addColorStop(1,'rgba(0,0,0,0.98)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

// ── Loop ───────────────────────────────────────────────────
function render(ts) {
  const now=performance.now();
  updateWander(now);
  for (let i=0;i<threads.length;i++) {
    if (threads[i].isDead(now)) {
      const t=new Thread();
      for (const nd of t.nodes) { nd.x=wander.x+(Math.random()-0.5)*40; nd.y=wander.y+(Math.random()-0.5)*40; }
      threads[i]=t;
    }
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  drawBG();
  for (const th of threads) { th.update(ts,now,threads); th.draw(ts); }
  drawCursor(ts);
  drawMicIndicator();
  drawVignette();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
