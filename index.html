<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Line Curtain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #start {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 20; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  #start p { font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,0.35); font-family: sans-serif; }
  #back {
    position: fixed; top: 20px; left: 20px;
    z-index: 9999; color: rgba(255,255,255,0.30);
    font-size: 10px; letter-spacing: 0.3em;
    font-family: Georgia, serif; text-decoration: none;
  }
</style>
</head>
<body>
<div id="start"><p>TAP TO START</p></div>
<a id="back" href="https://yoshiharumatsumoto-newtral.github.io/">← back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initLines(); });

const LINE_COUNT = 100;
const SEGMENTS = 24;
const SPRING = 0.04;
const DAMPING = 0.88;
const RADIUS = 200;
const FINGER_R = 12;

let lines = [];
let audioCtx = null;
let started = false;
let fingers = [];

// スワイプで通過したラインのインデックスを追跡
let lastTriggeredLineIdx = -1;

const CHIME_NOTES = [
  261.63, 293.66, 329.63, 392.00, 440.00,
  523.25, 587.33, 659.25, 783.99, 880.00,
  1046.50, 1174.66, 1318.51, 1567.98, 1760.00
];

function initLines() {
  lines = [];
  for (let i = 0; i < LINE_COUNT; i++) {
    const x = (W / (LINE_COUNT - 1)) * i;
    const nodes = [];
    for (let j = 0; j <= SEGMENTS; j++) {
      nodes.push({ x, y: (H / SEGMENTS) * j, ox: x, vx: 0 });
    }
    lines.push({ nodes, baseX: x });
  }
}
initLines();

function playChime(lineIndex, yRatio) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  const ratio = lineIndex / (LINE_COUNT - 1);
  const noteIdx = Math.floor(ratio * (CHIME_NOTES.length - 1));
  const freq = CHIME_NOTES[noteIdx];
  const decay = 1.5 + (1 - ratio) * 1.2;

  const cutoff = 8000 - yRatio * 6000;
  const Q = 2.0 + yRatio * 3.0;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = freq;
  osc2.type = 'sine'; osc2.frequency.value = freq * 2.756;

  const g1 = audioCtx.createGain(); g1.gain.value = 1.0;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.35;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = cutoff; bp.Q.value = Q;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0.20, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + decay);

  osc1.connect(g1); g1.connect(bp);
  osc2.connect(g2); g2.connect(bp);
  bp.connect(env);
  env.connect(audioCtx.destination);

  osc1.start(now); osc1.stop(now + decay + 0.1);
  osc2.start(now); osc2.stop(now + decay * 0.5 + 0.1);
}

// スワイプで通過したラインだけを1本ずつ鳴らす
function checkLinesCrossed(px, py) {
  const yRatio = py / H;

  // 最も近いラインのインデックスを求める
  let closestIdx = Math.round(px / W * (LINE_COUNT - 1));
  closestIdx = Math.max(0, Math.min(LINE_COUNT - 1, closestIdx));

  // 前回と違うラインに来た時だけ鳴らす
  if (closestIdx !== lastTriggeredLineIdx) {
    playChime(closestIdx, yRatio);
    lastTriggeredLineIdx = closestIdx;
  }
}

function applyForce(px, py, speedX, speedY) {
  const speed = Math.sqrt(speedX * speedX + speedY * speedY);
  if (speed < 0.5) return;
  const forceMag = Math.min(speed * 0.3, 4.0);

  for (const line of lines) {
    for (let j = 1; j <= SEGMENTS; j++) {
      const node = line.nodes[j];
      const dx = node.x - px;
      const dy = node.y - py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > RADIUS || dist < 0.001) continue;
      const falloff = (1 - dist / RADIUS) ** 2;
      const dir = dx < 0 ? -1 : 1;
      node.vx += dir * falloff * forceMag;
    }
  }
}

function applyFingerWall() {
  for (const finger of fingers) {
    for (const line of lines) {
      for (let j = 1; j <= SEGMENTS; j++) {
        const node = line.nodes[j];
        const dx = node.x - finger.x;
        const dy = node.y - finger.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < FINGER_R && dist > 0.001) {
          const nx = dx / dist;
          node.x += nx * (FINGER_R - dist) * 0.3;
          if (node.vx * nx < 0) node.vx *= -0.1;
        }
      }
    }
  }
}

// マウス
let lastMX = 0, lastMY = 0, isMouseDown = false;
canvas.addEventListener('mousedown', e => {
  isMouseDown = true;
  fingers = [{ x: e.clientX, y: e.clientY }];
  lastTriggeredLineIdx = -1;
  checkLinesCrossed(e.clientX, e.clientY);
  applyForce(e.clientX, e.clientY, 8, 0);
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (isMouseDown) {
    fingers = [{ x: e.clientX, y: e.clientY }];
    const sx = e.clientX - lastMX, sy = e.clientY - lastMY;
    checkLinesCrossed(e.clientX, e.clientY);
    applyForce(e.clientX, e.clientY, sx, sy);
  }
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  isMouseDown = false; fingers = [];
  lastTriggeredLineIdx = -1;
});

// タッチ
const touchPrev = {};
const touchLastLine = {};
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  for (const t of e.changedTouches) {
    touchPrev[t.identifier] = { x: t.clientX, y: t.clientY };
    touchLastLine[t.identifier] = -1;
    checkLinesCrossed(t.clientX, t.clientY);
    applyForce(t.clientX, t.clientY, 8, 0);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  for (const t of e.changedTouches) {
    const prev = touchPrev[t.identifier];
    if (prev) {
      const sx = t.clientX - prev.x, sy = t.clientY - prev.y;

      // 各タッチごとに最寄りラインを追跡
      const closestIdx = Math.max(0, Math.min(LINE_COUNT - 1,
        Math.round(t.clientX / W * (LINE_COUNT - 1))
      ));
      if (closestIdx !== touchLastLine[t.identifier]) {
        playChime(closestIdx, t.clientY / H);
        touchLastLine[t.identifier] = closestIdx;
      }

      applyForce(t.clientX, t.clientY, sx, sy);
      touchPrev[t.identifier] = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    delete touchPrev[t.identifier];
    delete touchLastLine[t.identifier];
  }
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
}, { passive: false });

function update() {
  for (const line of lines) {
    for (let j = 0; j <= SEGMENTS; j++) {
      const node = line.nodes[j];
      if (j === 0) { node.x = line.baseX; node.vx = 0; continue; }
      node.vx += (node.ox - node.x) * SPRING;
      node.vx *= DAMPING;
      node.x += node.vx;
      node.vx -= (node.x - line.nodes[j - 1].x) * 0.015;
    }
  }
  if (fingers.length > 0) applyFingerWall();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const line of lines) {
    ctx.beginPath();
    ctx.moveTo(line.nodes[0].x, line.nodes[0].y);
    for (let j = 1; j <= SEGMENTS; j++) {
      const prev = line.nodes[j - 1];
      const curr = line.nodes[j];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.lineTo(line.nodes[SEGMENTS].x, line.nodes[SEGMENTS].y);
    ctx.stroke();
  }

  update();
  requestAnimationFrame(draw);
}

function handleStart(e) {
  e.preventDefault();
  if (started) return;
  started = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  startScreen.style.display = 'none';
}

startScreen.addEventListener('touchstart', handleStart, { passive: false });
startScreen.addEventListener('click', handleStart);

draw();
</script>
</body>
</html>
