<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Line Curtain</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #start {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 20; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  #start p { font-size: 10px; letter-spacing: 0.4em; color: rgba(255,255,255,0.35); font-family: sans-serif; }
  #back {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 9999;
    color: rgba(255,255,255,0.30);
    font-size: 10px;
    letter-spacing: 0.3em;
    font-family: Georgia, serif;
    text-decoration: none;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<div id="start"><p>TAP TO START</p></div>
<a id="back" href="https://yoshiharumatsumoto-newtral.github.io/">← back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initLines(); });

const LINE_COUNT = 100;
const SEGMENTS = 24;
const SPRING = 0.04;
const DAMPING = 0.88;
const RADIUS = 200;
const FINGER_R = 12; // 指の壁の半径

let lines = [];
let audioCtx = null;
let started = false;
let fingers = []; // 現在の指の位置リスト

const CHIME_NOTES = [
  523.25, 659.25, 783.99, 1046.50, 1318.51,
  1567.98, 1760.00, 2093.00, 2637.02, 3136.00,
  3520.00, 4186.01, 4698.64
];

function initLines() {
  lines = [];
  for (let i = 0; i < LINE_COUNT; i++) {
    const x = (W / (LINE_COUNT - 1)) * i;
    const nodes = [];
    for (let j = 0; j <= SEGMENTS; j++) {
      nodes.push({ x, y: (H / SEGMENTS) * j, ox: x, vx: 0 });
    }
    lines.push({
      nodes, baseX: x,
      chimeGain: null,
      chimeActive: false,
      lastTriggered: 0,
    });
  }
}
initLines();

function startChime(lineIndex, yRatio) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const line = lines[lineIndex];
  if (now - line.lastTriggered < 0.08) return;
  line.lastTriggered = now;

  const ratio = lineIndex / (LINE_COUNT - 1);
  const noteIdx = Math.floor(ratio * (CHIME_NOTES.length - 1));
  const freq = CHIME_NOTES[noteIdx];
  const decay = 1.8 + (1 - ratio) * 1.5;
  const cutoff = 8000 - yRatio * 6000;
  const resonance = 2.0 + yRatio * 4.0;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  osc1.type = 'sine'; osc1.frequency.value = freq;
  osc2.type = 'sine'; osc2.frequency.value = freq * 2.756;
  osc3.type = 'sine'; osc3.frequency.value = freq * 5.404;

  const mix = audioCtx.createGain(); mix.gain.value = 1.0;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.4;
  const g3 = audioCtx.createGain(); g3.gain.value = 0.18;

  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 800; hp.Q.value = 0.5;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = cutoff; bp.Q.value = resonance;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0.28, now);
  env.gain.exponentialRampToValueAtTime(0.001, now + decay);

  const delay = audioCtx.createDelay(0.5);
  delay.delayTime.value = 0.055;
  const delayGain = audioCtx.createGain(); delayGain.gain.value = 0.15;

  osc1.connect(mix); osc2.connect(g2); g2.connect(mix); osc3.connect(g3); g3.connect(mix);
  mix.connect(hp); hp.connect(bp); bp.connect(env);
  env.connect(audioCtx.destination);
  env.connect(delay); delay.connect(delayGain); delayGain.connect(audioCtx.destination);

  osc1.start(now); osc1.stop(now + decay + 0.2);
  osc2.start(now); osc2.stop(now + decay * 0.6 + 0.1);
  osc3.start(now); osc3.stop(now + decay * 0.3 + 0.1);

  line.chimeGain = env;
  line.chimeActive = true;
  setTimeout(() => { line.chimeActive = false; line.chimeGain = null; }, (decay + 0.3) * 1000);
}

function syncChimeToDisplacement() {
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    if (!line.chimeActive || !line.chimeGain) continue;
    let maxDisp = 0;
    for (const node of line.nodes) maxDisp = Math.max(maxDisp, Math.abs(node.x - node.ox));
    const dispRatio = Math.min(1, maxDisp / 40);
    try {
      line.chimeGain.gain.setTargetAtTime(Math.max(0.001, dispRatio * 0.28), audioCtx.currentTime, 0.3);
    } catch(e) {}
  }
}

function applyTouch(px, py, speedX, speedY) {
  const speed = Math.sqrt(speedX * speedX + speedY * speedY);
  if (speed < 0.5) return;
  const yRatio = py / H;
  const forceMag = Math.min(speed * 0.3, 4.0);

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    let triggered = false;
    for (let j = 1; j <= SEGMENTS; j++) {
      const node = line.nodes[j];
      const dx = node.x - px;
      const dy = node.y - py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > RADIUS || dist < 0.001) continue;
      const falloff = (1 - dist / RADIUS) ** 2;
      const dir = dx < 0 ? -1 : 1;
      node.vx += dir * falloff * forceMag;
      if (falloff > 0.1 && !triggered) {
        startChime(li, yRatio);
        triggered = true;
      }
    }
  }
}

// 指を壁として適用：ノードが指の半径内に入ったら押し出す
function applyFingerWall() {
  for (const finger of fingers) {
    for (const line of lines) {
      for (let j = 1; j <= SEGMENTS; j++) {
        const node = line.nodes[j];
        const dx = node.x - finger.x;
        const dy = node.y - finger.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < FINGER_R && dist > 0.001) {
          // 指の外側に押し出す
          const nx = dx / dist;
          const push = FINGER_R - dist;
          node.x += nx * push * 0.3;
          // 速度も押し出す方向に
          if (node.vx * nx < 0) node.vx *= -0.1;
        }
      }
    }
  }
}

// マウス
let lastMX = 0, lastMY = 0;
let isMouseDown = false;
canvas.addEventListener('mousedown', e => {
  isMouseDown = true;
  fingers = [{ x: e.clientX, y: e.clientY }];
  applyTouch(e.clientX, e.clientY, 8, 0);
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (isMouseDown) {
    fingers = [{ x: e.clientX, y: e.clientY }];
    applyTouch(e.clientX, e.clientY, e.clientX - lastMX, e.clientY - lastMY);
  }
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => { isMouseDown = false; fingers = []; });

// タッチ
const touchPrev = {};
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  for (const t of e.changedTouches) {
    touchPrev[t.identifier] = { x: t.clientX, y: t.clientY };
    applyTouch(t.clientX, t.clientY, 8, 0);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  for (const t of e.changedTouches) {
    const prev = touchPrev[t.identifier];
    if (prev) {
      applyTouch(t.clientX, t.clientY, t.clientX - prev.x, t.clientY - prev.y);
      touchPrev[t.identifier] = { x: t.clientX, y: t.clientY };
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) delete touchPrev[t.identifier];
  fingers = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
}, { passive: false });

function update() {
  for (const line of lines) {
    for (let j = 0; j <= SEGMENTS; j++) {
      const node = line.nodes[j];
      if (j === 0) { node.x = line.baseX; node.vx = 0; continue; }
      node.vx += (node.ox - node.x) * SPRING;
      node.vx *= DAMPING;
      node.x += node.vx;
      node.vx -= (node.x - line.nodes[j - 1].x) * 0.015;
    }
  }

  // 指の壁を適用（バネで戻ろうとしても指が壁になる）
  if (fingers.length > 0) applyFingerWall();

  if (audioCtx) syncChimeToDisplacement();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const line of lines) {
    ctx.beginPath();
    ctx.moveTo(line.nodes[0].x, line.nodes[0].y);
    for (let j = 1; j <= SEGMENTS; j++) {
      const prev = line.nodes[j - 1];
      const curr = line.nodes[j];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.lineTo(line.nodes[SEGMENTS].x, line.nodes[SEGMENTS].y);
    ctx.stroke();
  }

  update();
  requestAnimationFrame(draw);
}

function handleStart(e) {
  e.preventDefault();
  if (started) return;
  started = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  startScreen.style.display = 'none';
}

startScreen.addEventListener('touchstart', handleStart, { passive: false });
startScreen.addEventListener('click', handleStart);

draw();
</script>
</body>
</html>
