<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; cursor: none; }
  canvas { display: block; }
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(180,220,180,0.18);
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 2s;
  }
  #back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    color: rgba(255,255,255,0.30);
    font-size: 10px;
    letter-spacing: 0.3em;
    font-family: 'Georgia', serif;
    text-decoration: none;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<a id="back" href="https://yoshiharumatsumoto-newtral.github.io/">← back</a>
<canvas id="c"></canvas>
<div id="hint">— touch —</div>
<script>
// Lock to portrait if supported
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('portrait').catch(()=>{});
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DPR = window.devicePixelRatio || 1;
let W = window.innerWidth;
let H = window.innerHeight;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

window.addEventListener('resize', () => { resizeCanvas(); init(); });

// ── Pointers ──────────────────────────────────────────────
const mouse = { x: W*0.5, y: H*0.5, vx:0, vy:0, active: false };
const touches = [];
function getPointers() {
  return touches.length > 0 ? touches : [mouse];
}

const hint = document.getElementById('hint');

// ── Microphone ─────────────────────────────────────────────
let micLevel = 0;      // 0.0 – 1.0 smoothed
let micRaw   = 0;
let micReady = false;

let sharedAC = null, masterGain = null;
const activeNodes = {};

function getAC() {
  if (!sharedAC) {
    sharedAC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = sharedAC.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(sharedAC.destination);
  }
  return sharedAC;
}

function makeNoise(ac) {
  const buf = ac.createBuffer(1, ac.sampleRate*2, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
  const src = ac.createBufferSource();
  src.buffer = buf; src.loop = true;
  return src;
}

function noteOn(id, x, y) {
  if (activeNodes[id]) return;
  const ac = getAC(); ac.resume();
  const noise = makeNoise(ac);
  const gain = ac.createGain();
  const f1 = ac.createBiquadFilter();
  const f2 = ac.createBiquadFilter();

  f1.type = 'bandpass';
  f1.frequency.value = 100 + (x/W)*800;
  f1.Q.value = 3 + (1-y/H)*8;
  f2.type = 'highpass';
  f2.frequency.value = 80 + (1-y/H)*400;

  gain.gain.setValueAtTime(0, ac.currentTime);
  gain.gain.linearRampToValueAtTime(0.8, ac.currentTime+0.2);

  noise.connect(f1); f1.connect(f2); f2.connect(gain); gain.connect(masterGain);
  noise.start();
  activeNodes[id] = { noise, gain, f1, f2 };
}

function noteUpdate(id, x, y, vx, vy) {
  const n = activeNodes[id]; if (!n) return;
  const ac = getAC();
  n.f1.frequency.setTargetAtTime(100+(x/W)*800, ac.currentTime, 0.1);
  n.f1.Q.setTargetAtTime(3+(1-y/H)*8, ac.currentTime, 0.1);
  const spd = Math.sqrt(vx*vx+vy*vy);
  n.gain.gain.setTargetAtTime(0.8+spd*0.02, ac.currentTime, 0.05);
}

function noteOff(id) {
  const n = activeNodes[id]; if (!n) return;
  const ac = getAC();
  n.gain.gain.setTargetAtTime(0, ac.currentTime, 0.4);
  setTimeout(() => { try { n.noise.stop(); } catch(e){} delete activeNodes[id]; }, 1500);
}

async function initMic() {
  try {
    const ac = getAC();
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
    const src = ac.createMediaStreamSource(stream);
    const an = ac.createAnalyser(); an.fftSize=256;
    src.connect(an);
    const buf = new Uint8Array(an.frequencyBinCount);
    micReady = true;
    function tick() {
      an.getByteTimeDomainData(buf);
      let sum=0; for(let i=0;i<buf.length;i++){const v=(buf[i]-128)/128;sum+=v*v;}
      micRaw=Math.sqrt(sum/buf.length);
      micLevel+=(micRaw*6.0-micLevel)*0.25;
      micLevel=Math.min(Math.max(micLevel,0),1);
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) { console.warn('Mic not available',e); }
}
initMic();

window.addEventListener('mousemove', e => {
  mouse.vx = e.clientX - mouse.x; mouse.vy = e.clientY - mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
  hint.style.opacity = '0';
});
window.addEventListener('touchstart', e => {
  if (e.target.id === 'back') return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    touches.push({ x:t.clientX, y:t.clientY, vx:0, vy:0, id:t.identifier });
    noteOn(t.identifier, t.clientX, t.clientY);
  }
  hint.style.opacity = '0';
}, { passive:false });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = touches.find(p => p.id === t.identifier);
    if (p) { p.vx = t.clientX-p.x; p.vy = t.clientY-p.y; p.x = t.clientX; p.y = t.clientY; noteUpdate(t.identifier, t.clientX, t.clientY, p.vx, p.vy); }
    if (e.touches[0].identifier === t.identifier) {
      mouse.vx = t.clientX-mouse.x; mouse.vy = t.clientY-mouse.y;
      mouse.x = t.clientX; mouse.y = t.clientY;
    }
  }
}, { passive:false });
window.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    const i = touches.findIndex(p => p.id === t.identifier);
    if (i !== -1) touches.splice(i,1);
    noteOff(t.identifier);
  }
}, { passive:false });

// ── Colour palette — muted, spiritual ─────────────────────
const PALETTE = [
  [195, 55, 72],
  [168, 45, 76],
  [210, 38, 68],
  [180, 30, 63],
  [152, 48, 78],
  [220, 42, 65],
];

// ── Thread ─────────────────────────────────────────────────
class Thread {
  constructor(staggerOffset) {
    this.born = performance.now() - (staggerOffset||0);
    this._init();
  }

  _init() {
    const zone = Math.random();
    if (zone < 0.25) {
      const side = Math.floor(Math.random()*4);
      this.ox = side===0?Math.random()*W : side===1?W : side===2?Math.random()*W : 0;
      this.oy = side===0?0 : side===1?Math.random()*H : side===2?H : Math.random()*H;
    } else {
      this.ox = W*(0.08 + Math.random()*0.84);
      this.oy = H*(0.08 + Math.random()*0.84);
    }

    const count = 5 + Math.floor(Math.random()*6);
    this.nodes = [];
    this.rest  = [];
    for (let i=0; i<=count; i++) {
      const x = this.ox + (Math.random()-0.5)*(120+Math.random()*260);
      const y = this.oy + (Math.random()-0.5)*(120+Math.random()*260);
      this.nodes.push({ x, y, vx:0, vy:0 });
      this.rest.push({ x, y });
    }

    const col = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    this.hue = col[0] + (Math.random()-0.5)*18;
    this.sat = col[1] + (Math.random()-0.5)*12;
    this.lit = col[2] + (Math.random()-0.5)*10;
    this.maxAlpha = 0.12 + Math.random()*0.52;
    this.width    = 0.3 + Math.random()*1.0;
    this.phase    = Math.random()*Math.PI*2;
    this.noiseSpd = 0.0003 + Math.random()*0.0007;

    this.attractR   = 150 + Math.random()*230;
    this.attractStr = 0.007 + Math.random()*0.016;
    this.damping    = 0.91 + Math.random()*0.06;
    this.restore    = 0.0015 + Math.random()*0.003;

    this.lifespan = 7000 + Math.random()*16000;
    this.fadeIn   = 1000 + Math.random()*1500;
    this.fadeOut  = 1500 + Math.random()*2500;

    this.linkedTo  = null;
    this.linkStr   = 0.0006 + Math.random()*0.001;
    this.alpha     = 0;
  }

  lifeAlpha(now) {
    const age  = now - this.born;
    const left = this.lifespan - age;
    if (age  < this.fadeIn)  return Math.pow(age/this.fadeIn, 1.5);
    if (left < this.fadeOut) return Math.max(0, Math.pow(left/this.fadeOut, 1.2));
    return 1;
  }

  isDead(now) { return (now - this.born) > this.lifespan; }

  update(time, now, all) {
    const la = this.lifeAlpha(now);
    this.alpha = this.maxAlpha * la;

    // Lazy thread linking
    if (!this.linkedTo && Math.random() < 0.0008 && all.length > 1) {
      this.linkedTo = all[Math.floor(Math.random()*all.length)];
      if (this.linkedTo === this) this.linkedTo = null;
    }
    if (this.linkedTo && this.linkedTo.isDead(now)) this.linkedTo = null;

    const ptrs = getPointers();

    for (let i=0; i<this.nodes.length; i++) {
      const nd = this.nodes[i];
      const rs = this.rest[i];

      const dnx = Math.sin(time*this.noiseSpd*1.4 + i*1.9 + this.phase)*0.45;
      const dny = Math.cos(time*this.noiseSpd*1.1 + i*2.3 + this.phase+1)*0.45;

      const rx = (rs.x - nd.x)*this.restore;
      const ry = (rs.y - nd.y)*this.restore;

      let ax=0, ay=0;

      // Pointer pull
      for (const ptr of ptrs) {
        const dx = ptr.x - nd.x, dy = ptr.y - nd.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < this.attractR) {
          const f = Math.pow(1 - d/this.attractR, 3) * this.attractStr * 2.5;
          ax += dx*f + ptr.vx*f*0.22;
          ay += dy*f + ptr.vy*f*0.22;
        }
      }

      // Thread-to-thread ghost pull
      if (this.linkedTo) {
        const ot = this.linkedTo.nodes[Math.min(i, this.linkedTo.nodes.length-1)];
        const lx = ot.x - nd.x, ly = ot.y - nd.y;
        const ld = Math.sqrt(lx*lx + ly*ly);
        if (ld > 0 && ld < 280) {
          ax += lx*this.linkStr; ay += ly*this.linkStr;
        }
      }

      // Mic shake — louder = more turbulence
      if (micLevel > 0.01) {
        const shake = micLevel * 12.0;
        ax += (Math.random()-0.5) * shake;
        ay += (Math.random()-0.5) * shake;
      }

      nd.vx = (nd.vx + dnx + rx + ax)*this.damping;
      nd.vy = (nd.vy + dny + ry + ay)*this.damping;
      nd.x += nd.vx;
      nd.y += nd.vy;
    }
  }

  draw(time) {
    if (this.nodes.length < 2 || this.alpha < 0.004) return;
    const pulse = (0.78 + 0.22*Math.sin(time*0.0007 + this.phase)) * (1 + micLevel * 2.5);
    const a = this.alpha * pulse;

    // Outer halo
    ctx.save();
    ctx.globalAlpha = a * 0.18;
    ctx.strokeStyle = `hsla(${this.hue},${this.sat}%,80%,1)`;
    ctx.lineWidth = this.width * 5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    this._path(); ctx.stroke();
    ctx.restore();

    // Core — pure white, crisp
    ctx.save();
    ctx.globalAlpha = a * 0.95;
    ctx.strokeStyle = 'rgba(255,255,255,1)';
    ctx.lineWidth = this.width * 0.8;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    this._path(); ctx.stroke();
    ctx.restore();
  }

  _path() {
    const n = this.nodes;
    ctx.beginPath();
    ctx.moveTo(n[0].x, n[0].y);
    for (let i=1; i<n.length-1; i++) {
      const mx = (n[i].x+n[i+1].x)*0.5;
      const my = (n[i].y+n[i+1].y)*0.5;
      ctx.quadraticCurveTo(n[i].x, n[i].y, mx, my);
    }
    ctx.lineTo(n[n.length-1].x, n[n.length-1].y);
  }
}

// ── Init ───────────────────────────────────────────────────
let threads = [];
function init() {
  threads = [];
  for (let i=0; i<72; i++) {
    const t = new Thread();
    t.born = performance.now() - Math.random()*t.lifespan*0.85;
    threads.push(t);
  }
}
init();

// ── BG ─────────────────────────────────────────────────────
function drawBG() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);
  const g = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.5, Math.max(W,H)*0.7);
  g.addColorStop(0, 'rgba(3,10,6,0.95)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);
}

// ── Cursor ─────────────────────────────────────────────────
function drawCursor(time) {
  const ptrs = touches.length>0 ? touches : (mouse.active ? [mouse] : []);
  const pulse = 0.4 + 0.6*Math.sin(time*0.002);
  for (const ptr of ptrs) {
    ctx.save();
    ctx.globalAlpha = 0.08 * pulse;
    ctx.strokeStyle = 'rgba(160,230,160,1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(ptr.x, ptr.y, 18, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = 0.25 * pulse;
    ctx.fillStyle = 'rgba(180,255,160,1)';
    ctx.beginPath();
    ctx.arc(ptr.x, ptr.y, 1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Mic indicator ─────────────────────────────────────────
function drawMicIndicator() {
  if (!micReady) return;
  const x = 28, y = H - 28;
  // Ring that pulses with mic level
  ctx.save();
  ctx.globalAlpha = 0.15 + micLevel * 0.5;
  ctx.strokeStyle = 'rgba(200,255,180,1)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(x, y, 8 + micLevel * 14, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
  // Center dot
  ctx.save();
  ctx.globalAlpha = 0.3 + micLevel * 0.6;
  ctx.fillStyle = 'rgba(200,255,180,1)';
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ── Vignette ───────────────────────────────────────────────
function drawVignette() {
  const vg = ctx.createRadialGradient(W*0.5, H*0.5, H*0.12, W*0.5, H*0.5, H*0.88);
  vg.addColorStop(0,   'rgba(0,0,0,0)');
  vg.addColorStop(0.65,'rgba(0,0,0,0.25)');
  vg.addColorStop(1,   'rgba(0,0,0,0.98)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);
}

// ── Loop ───────────────────────────────────────────────────
function render(ts) {
  const now = performance.now();

  for (let i=0; i<threads.length; i++) {
    if (threads[i].isDead(now)) threads[i] = new Thread();
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0,0,W,H);
  drawBG();

  for (const th of threads) { th.update(ts, now, threads); th.draw(ts); }

  drawCursor(ts);
  drawMicIndicator();
  drawVignette();
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
